name: Build and release Tauri desktop app

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "packages/app-tauri/src-tauri -> target"

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install npm dependencies and build UI
        run: |
          npm ci
          make build

      - name: Build sidecar binary
        shell: bash
        run: bash packages/app-tauri/scripts/build-sidecar.sh

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/app-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Loamium ${{ github.ref_name }}"
          releaseBody: "See DEPLOY.md for installation and setup instructions."
          releaseDraft: false
          prerelease: false
